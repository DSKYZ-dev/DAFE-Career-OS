# DAFE Career OS — Job Focus Catalog (SYSTEM LAYER — do not put personal data here)
#
# Starter categories the dashboard's Settings > Job Focus UI lets any user
# multi-select from, regardless of what field they're in. Each category is a
# stable `id` (referenced by config/profile.yml's user-layer `active_focuses`
# — renaming a `label` here later won't orphan anyone's selection) plus seed
# keywords used by title-filter.mjs to match real job-posting titles.
#
# Add more categories freely — this is meant to be edited. Keywords should be
# short, realistic title fragments (2-4 words), not compound/decorative
# phrases — title-filter.mjs matches them close to literally.

focuses:
  - id: software-engineering
    label: "Software Engineering"
    keywords: ["software engineer", "backend engineer", "frontend engineer", "full stack engineer", "application developer"]

  - id: ai-ml
    label: "AI / Machine Learning"
    keywords: ["machine learning engineer", "ai engineer", "ml engineer", "deep learning engineer", "nlp engineer"]

  - id: data
    label: "Data / Analytics"
    keywords: ["data engineer", "data analyst", "data scientist", "business intelligence", "analytics engineer"]

  - id: product
    label: "Product Management"
    keywords: ["product manager", "product owner", "technical product manager"]

  - id: design
    label: "Design / UX"
    keywords: ["product designer", "ux designer", "ui designer", "graphic designer"]

  - id: devops-infra
    label: "DevOps / Infrastructure"
    keywords: ["devops engineer", "site reliability engineer", "infrastructure engineer", "platform engineer", "cloud engineer"]

